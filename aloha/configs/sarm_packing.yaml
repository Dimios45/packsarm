# SARM Training Configuration for Bimanual Packing Task
# Used by train_sarm.sh

# Model architecture
policy:
  type: sarm
  annotation_mode: single_stage
  n_obs_steps: 8
  frame_gap: 2
  max_rewind_steps: 4
  hidden_dim: 768
  num_heads: 12
  num_layers: 8
  image_dim: 512
  text_dim: 512
  max_state_dim: 32
  dropout: 0.1
  batch_size: 64
  clip_batch_size: 64
  stage_loss_weight: 1.0
  rewind_probability: 0.8
  language_perturbation_probability: 0.2
  image_key: observation.images.top
  state_key: observation.state

# Sparse stage configuration
  num_sparse_stages: 5
  sparse_subtask_names:
    - reach
    - grasp
    - transport
    - place
    - retract
  sparse_temporal_proportions:
    - 0.2
    - 0.1
    - 0.4
    - 0.2
    - 0.1

# Training
batch_size: 32
steps: 5000
eval_freq: 0
save_freq: 1000
log_freq: 100

# Optimizer
optimizer:
  type: adamw
  lr: 5.0e-5
  weight_decay: 0.001
  grad_clip_norm: 10.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Scheduler
scheduler:
  type: cosine_decay_with_warmup
  num_warmup_steps: 500
  num_decay_steps: 50000
  peak_lr: 5.0e-5
  decay_lr: 5.0e-6

# Output
output_dir: outputs/sarm_wbcd_packing
wandb:
  enable: false
